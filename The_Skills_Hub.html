<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Skills Hub | What To Do!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#F7F4ED;--navy:#182047;--blue:#4F5DAD;--blue-bg:#edf1f8;--blue-lt:#8BA4DC;--mint:#B4DACD;--mint-bg:#eaf4f0;--gold:#F4C95D;--gold-bg:#fff5d8;--pink:#BD3A59;--pink-bg:#f7e0e6;--text:#1e1e1e;--muted:#667085;--border:#e0ddd6;--white:#fff;--shadow:0 2px 14px rgba(0,0,0,.08);--radius:16px}body{font-family:'Source Sans 3','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.wrap{max-width:1240px;margin:0 auto;padding:26px 18px 70px}.toolbar{background:white;border-radius:18px;box-shadow:var(--shadow);padding:18px;display:grid;grid-template-columns:minmax(220px,1fr) auto;gap:14px;align-items:center;margin-bottom:20px}.search{position:relative}.search input{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:12px 14px 12px 40px;font:inherit;background:white}.search span{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-weight:800}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1.5px solid var(--border);background:white;border-radius:999px;padding:8px 13px;font:inherit;font-size:.85rem;font-weight:800;color:var(--muted);cursor:pointer}.chip.active,.chip:hover{background:var(--navy);border-color:var(--navy);color:white}.meta-row{display:flex;justify-content:space-between;gap:12px;align-items:center;margin:0 2px 14px;color:var(--muted);font-size:.88rem}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.skill-card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04);overflow:hidden;display:flex;flex-direction:column;min-height:270px;transition:.18s}.skill-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12)}.card-top{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.cat{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;font-weight:900;padding:5px 9px;border-radius:999px}.cat.Focus{background:var(--mint-bg);color:#2a6357}.cat.Coping{background:var(--pink-bg);color:#8a1a35}.cat.Connecting{background:var(--gold-bg);color:#7a5600}.cat.Feelings{background:var(--blue-bg);color:#2d3880}.time{font-size:.72rem;color:var(--muted);font-weight:800;background:var(--bg);border-radius:999px;padding:5px 9px}.card-body{padding:17px;flex:1}.skill-card h2{color:var(--navy);font-size:1.12rem;line-height:1.18;margin-bottom:8px}.desc{color:var(--muted);font-size:.9rem;line-height:1.55;margin-bottom:12px}.outcome{background:var(--bg);border-left:3px solid var(--mint);border-radius:8px;padding:10px;color:#3b4652;font-size:.82rem;line-height:1.45}.card-actions{padding:13px 16px;border-top:1px solid var(--border);display:flex;gap:8px}.btn{border:0;border-radius:10px;padding:10px 13px;font:inherit;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;text-decoration:none}.btn-primary{background:var(--navy);color:white;flex:1}.btn-secondary{background:var(--blue-bg);color:var(--blue)}.empty{display:none;background:white;border-radius:18px;box-shadow:var(--shadow);padding:34px;text-align:center;color:var(--muted)}.drawer{position:fixed;inset:0;background:rgba(16,23,53,.62);z-index:50;display:none;align-items:center;justify-content:center;padding:18px}.drawer.open{display:flex}.practice-modal{background:var(--bg);width:min(1100px,100%);height:min(780px,92vh);border-radius:20px;overflow:hidden;box-shadow:0 18px 60px rgba(0,0,0,.28);display:flex;flex-direction:column}.modal-head{background:var(--navy);color:white;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}.modal-title{font-weight:800}.modal-cat{font-size:.75rem;color:rgba(255,255,255,.65)}.modal-actions{display:flex;gap:8px}.modal-actions button,.modal-actions a{border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:white;border-radius:9px;padding:8px 11px;font:inherit;font-size:.82rem;font-weight:800;text-decoration:none;cursor:pointer}.practice-frame{width:100%;height:100%;border:0;background:white}.loading{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}.loading.hidden{display:none}.spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}.toolbar{grid-template-columns:1fr}}@media(max-width:640px){.wrap{padding:18px 14px 60px}.grid{grid-template-columns:1fr}.card-actions{flex-direction:column}.btn{width:100%}.meta-row{flex-direction:column;align-items:flex-start}}
.skill-note{color:var(--muted);font-size:.88rem;line-height:1.5;margin-bottom:8px}.skill-note strong{display:block;color:var(--navy);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}.skill-actions{gap:14px;padding:16px}.skill-actions .btn{min-height:54px;border-radius:15px;font-size:1rem}.btn-practice{background:var(--navy);color:white;flex:1.15}.btn-stack{background:var(--mint-bg);color:#2a6357;flex:.9}.btn-skip{background:#fff0e7;color:#9a3f00;flex:.8}@media(max-width:640px){.skill-actions{flex-direction:row}.skill-actions .btn{width:auto;font-size:.94rem;padding:10px 9px}}
</style>
</head>
<body>
<div class="loading" id="loading"><div style="font-weight:900;color:var(--navy);font-size:1.25rem">What To Do!</div><div class="spin"></div><div style="color:var(--muted);font-size:.86rem">Loading skills…</div></div>
<main class="wrap">
  <section class="toolbar"><div class="search"><span>⌕</span><input id="search" placeholder="Find a skill for today: stuck, overwhelmed, emotional, conflict..." oninput="render()"></div><div class="chips" id="chips"></div></section>
  <div class="meta-row"><strong id="countLabel">0 skills</strong><span>This is not a content library. It is a practical skills toolkit for real life.</span></div>
  <section class="grid" id="grid"></section>
  <div class="empty" id="empty"><strong>No matching skills yet.</strong><br>Try another search or category.</div>
</main>
<div class="drawer" id="drawer"><div class="practice-modal"><div class="modal-head"><div><div class="modal-title" id="modalTitle">Skill Practice</div><div class="modal-cat" id="modalCat"></div></div><div class="modal-actions"><a id="openNew" href="#" target="_blank">Open New Tab</a><button onclick="closePractice()">Close</button></div></div><iframe class="practice-frame" id="frame" title="Skill practice"></iframe></div></div>
<script>
const SKILL_BASE_URL='https://whattodo-skills.github.io/skills/';
const FALLBACK_SKILLS=[
{id:'begin-again',name:'Begin Again',category:'Focus',htmlUrl:SKILL_BASE_URL+'Begin_Again_Focus_Practice.html',description:'Your attention wanders and you start judging yourself for losing focus.',desiredOutcome:'Return to what matters without turning distraction into failure.',practice:'Notice the drift, name it gently, and begin again with one focus target.',displayOrder:10},
{id:'single-task',name:'Single-Task Focus Practice',category:'Focus',htmlUrl:SKILL_BASE_URL+'Single_Task_Focus_Practice.html',description:'You are splitting your attention and losing the thread.',desiredOutcome:'Stay with one meaningful moment at a time.',practice:'Choose one thing, give it your attention, and come back when your mind drifts.',displayOrder:20},
{id:'start-task',name:'Start the Task',category:'Focus',htmlUrl:SKILL_BASE_URL+'Start_The_Task_Focus_Practice.html',description:'You are avoiding, frozen, or waiting for motivation.',desiredOutcome:'Lower overwhelm and break the task-starting loop.',practice:'Shrink the task and take one tiny first step.',displayOrder:30},
{id:'stone-focus',name:'Stone Focus Practice',category:'Focus',htmlUrl:SKILL_BASE_URL+'Stone_Focus_Practice.html',description:'Rumination, scrolling, or mental noise keeps pulling your attention away.',desiredOutcome:'Move attention back to one steady focus point.',practice:'Place your attention on one calming image and return to it when your mind wanders.',displayOrder:40},
{id:'observe',name:'Observe: Notice Before You React',category:'Focus',htmlUrl:SKILL_BASE_URL+'Observe_Notice_Before_You_React_Focus_Practice.html',description:'You are about to react, explain, fix, or defend too quickly.',desiredOutcome:'Create enough space to choose your next move on purpose.',practice:'Pause and observe what is happening before you respond.',displayOrder:50},
{id:'describe',name:'Describe: Say What Is Happening',category:'Focus',htmlUrl:SKILL_BASE_URL+'Describe_Say_What_Is_Happening_Focus_Practice.html',description:'The story, blame, or judgment is getting louder than the facts.',desiredOutcome:'Name the moment clearly so you can respond with more steadiness.',practice:'Describe what is happening without adding judgment.',displayOrder:60},
{id:'participate',name:'Participate: Be In It',category:'Focus',htmlUrl:SKILL_BASE_URL+'Participate_Be_In_It_Focus_Practice.html',description:'You are hovering outside the moment with worry or self-consciousness.',desiredOutcome:'Get more fully present with the task, person, or experience in front of you.',practice:'Enter the moment you are already in and do the next useful thing.',displayOrder:70},
{id:'thought-labeling',name:'Thought Labeling',category:'Focus',htmlUrl:SKILL_BASE_URL+'thought-labeling.html',description:'A thought is starting to feel like a fact, command, or emergency.',desiredOutcome:'Notice a thought without automatically obeying it.',practice:'Label it as a thought and come back to what is actually happening.',displayOrder:80},
{id:'inner-critic',name:'Inner Critic Practice',category:'Focus',htmlUrl:SKILL_BASE_URL+'Inner_Critic_Focus_Practice.html',description:'Your inner critic is loud, harsh, or treating a feeling like a fact.',desiredOutcome:'Separate judgment from facts and respond to yourself with more fairness.',practice:'Name the criticism, check what is true, and choose a kinder next thought.',displayOrder:90},
{id:'deep-breathing',name:'Deep Breathing Practice',category:'Coping',htmlUrl:SKILL_BASE_URL+'Deep_Breathing_Coping_Practice.html',description:'Your body is moving fast and you need a simple way to slow down.',desiredOutcome:'Feel more settled before you respond or decide.',practice:'Use your breath as a steady anchor for the next minute.',displayOrder:100},
{id:'ride-wave',name:'Ride the Wave',category:'Coping',htmlUrl:SKILL_BASE_URL+'Ride_The_Wave_Coping_Practice.html',description:'A strong urge is pulling you to react or make things worse.',desiredOutcome:'Pause long enough for the urge to rise, peak, and pass.',practice:'Track the wave in your body and choose a steadier next step.',displayOrder:110},
{id:'calm',name:'Calm Tool',category:'Coping',htmlUrl:SKILL_BASE_URL+'Calm_Coping_Tool.html',description:'Your body feels activated, overwhelmed, or hard to settle.',desiredOutcome:'Feel more grounded, clear, and able to choose your next step.',practice:'Use one calming cue, slow your breathing, and orient to what is here now.',displayOrder:120},
{id:'stop-skill',name:'The STOP Skill',category:'Coping',htmlUrl:SKILL_BASE_URL+'the-stop-skill.html',description:'You need to interrupt the reaction loop before it takes over.',desiredOutcome:'Slow the moment down and choose what helps next.',practice:'Stop, take a breath, observe, and proceed with care.',displayOrder:130},
{id:'thought-mood',name:'The Thought-Mood Connection',category:'Feelings',htmlUrl:SKILL_BASE_URL+'thought-mood-connection.html',description:'Your mood is shifting and you are not sure what thought is feeding it.',desiredOutcome:'Name the thought and mood so you can respond with more clarity.',practice:'Connect one thought, one feeling, and one next choice.',displayOrder:140},
{id:'check-story',name:'Check the Story',category:'Feelings',htmlUrl:SKILL_BASE_URL+'Check_The_Story_Feelings_Practice.html',description:'Your mind is telling a story and you are tempted to act on it fast.',desiredOutcome:'Separate facts from interpretations and choose a steadier response.',practice:'Check what you know, what you are guessing, and what else could be true.',displayOrder:150},
{id:'feelings-wheel',name:'The Feelings Wheel',category:'Feelings',htmlUrl:SKILL_BASE_URL+'the-feelings-wheel.html',description:'You feel overwhelmed, numb, or emotionally unclear.',desiredOutcome:'Identify what you feel and what the feeling may be asking for.',practice:'Move from a broad feeling word to a more specific one.',displayOrder:160},
{id:'conflict',name:'Connecting After Conflict',category:'Connecting',htmlUrl:SKILL_BASE_URL+'Connecting_After_Conflict.html',description:'A conflict happened and you need a repair-focused next step.',desiredOutcome:'Move from reactivity toward steadier communication and repair.',practice:'Reflect on what happened and choose one repair action.',displayOrder:170},
{id:'listener',name:'Great Listener Practice',category:'Connecting',htmlUrl:SKILL_BASE_URL+'Great_Listener_Connecting_Practice.html',description:'You want to interrupt, defend, fix, or explain.',desiredOutcome:'Slow down and understand before responding.',practice:'Listen to hear, not listen to win.',displayOrder:180},
{id:'hard-conversations',name:'Hard Conversations',category:'Connecting',htmlUrl:SKILL_BASE_URL+'Hard_Conversations_Connecting_Practice.html',description:'You need to say something important and want to stay clear and respectful.',desiredOutcome:'Ask for what you need, set limits, and stay connected to your values.',practice:'Prepare the conversation before you step into it.',displayOrder:190},
{id:'boundaries',name:'Healthy Boundaries',category:'Connecting',htmlUrl:SKILL_BASE_URL+'Healthy_Boundaries_Connecting_Practice.html',description:'Your time, energy, or values need protection.',desiredOutcome:'Set a respectful limit without disconnecting from yourself.',practice:'Build one clear boundary statement for a real situation.',displayOrder:200},
{id:'say-no',name:'Say No Without Guilt',category:'Connecting',htmlUrl:SKILL_BASE_URL+'Say_No_Without_Guilt_Connecting_Practice.html',description:'You need a limit but feel pulled to over-explain or people-please.',desiredOutcome:'Set a respectful limit while staying connected to your own needs and values.',practice:'Say the no clearly, kindly, and without adding extra arguments.',displayOrder:210}
];
let skills=FALLBACK_SKILLS.map(cleanSkill),activeCat='All';
const cats=[{label:'All',value:'All'},{label:'Focus',value:'Focus'},{label:'Coping',value:'Coping'},{label:'Feeling',value:'Feelings'},{label:'Connecting',value:'Connecting'}];
function normalizeCat(c){return (c||'Focus').replace(/\s+/g,'')}
function displayCat(c){return c==='Feelings'?'Feeling':c}
function getUrl(s){return s.htmlUrl||s.url||s.googleFile||'#'}
function cleanSkill(s,i){return{_id:s._id||s.id||`skill-${i}`,name:s.name||'Untitled Skill',category:s.category||'Focus',description:s.description||'',desiredOutcome:s.desiredOutcome||s.outcome||'',practice:s.practice||s.practicePrompt||s.practiceLine||'',htmlUrl:s.htmlUrl||s.url||s.googleFile||'',isPublished:s.isPublished!==false,displayOrder:s.displayOrder||999,timeEstimate:s.timeEstimate||'Practice'}}
function skillKey(s){return String(s.id||s._id||s.name||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}
function mergeSkills(incoming=[]){const map=new Map();FALLBACK_SKILLS.map(cleanSkill).forEach(s=>map.set(skillKey(s),s));incoming.map(cleanSkill).filter(s=>s.isPublished).forEach(s=>map.set(skillKey(s),{...(map.get(skillKey(s))||{}),...s}));return [...map.values()]}
function renderChips(){document.getElementById('chips').innerHTML=cats.map(c=>`<button class="chip ${activeCat===c.value?'active':''}" onclick="activeCat='${c.value}';render()">${c.label}</button>`).join('')}
function practiceLine(s){return s.practice||'Try this skill in one real moment today.'}
function skillPayload(s){return {skillId:s._id,skillName:s.name,skillTitle:s.name,category:s.category,practiceUrl:getUrl(s)}}
function card(s){return `<article class="skill-card"><div class="card-top"><span class="cat ${normalizeCat(s.category)}">${displayCat(s.category)}</span><span class="time">${s.timeEstimate||'Practice'}</span></div><div class="card-body"><h2>${s.name}</h2><p class="skill-note"><strong>Use this when:</strong>${s.description||'You need a practical next step.'}</p><p class="skill-note"><strong>This helps you:</strong>${s.desiredOutcome||'Choose what to do next with more steadiness.'}</p><div class="outcome"><strong>Practice:</strong> ${practiceLine(s)}</div></div><div class="card-actions skill-actions"><button class="btn btn-practice" onclick="openPractice('${s._id}')">Practice It</button><button class="btn btn-stack" onclick="stackSkill('${s._id}')">Stack It</button><button class="btn btn-skip" onclick="skipSkill('${s._id}')">Skip It</button></div></article>`}
function render(){const q=(document.getElementById('search').value||'').toLowerCase().trim();let list=skills.filter(s=>s.isPublished!==false).sort((a,b)=>(a.displayOrder||999)-(b.displayOrder||999)||a.name.localeCompare(b.name)).filter(s=>{const catOk=activeCat==='All'||s.category===activeCat;const hay=[s.name,s.category,s.description,s.desiredOutcome].join(' ').toLowerCase();return catOk&&(!q||hay.includes(q))});document.getElementById('grid').innerHTML=list.map(card).join('');document.getElementById('empty').style.display=list.length?'none':'block';document.getElementById('countLabel').textContent=`${list.length} skill${list.length===1?'':'s'}`}
function openPractice(id){const s=skills.find(x=>String(x._id)===String(id));if(!s)return;const url=getUrl(s);document.getElementById('modalTitle').textContent=s.name;document.getElementById('modalCat').textContent=s.category;document.getElementById('frame').src=url;document.getElementById('openNew').href=url;document.getElementById('drawer').classList.add('open')}
function stackSkill(id){const s=skills.find(x=>String(x._id)===String(id));if(!s)return;window.parent&&window.parent.postMessage({source:'wtd-skills-hub',action:'stack',skill:skillPayload(s)},'*')}
function skipSkill(id){const s=skills.find(x=>String(x._id)===String(id));if(!s)return;window.parent&&window.parent.postMessage({source:'wtd-skills-hub',action:'skip',skill:skillPayload(s)},'*')}
function closePractice(){document.getElementById('drawer').classList.remove('open');document.getElementById('frame').src='about:blank'}
window.addEventListener('message',e=>{const msg=e.data||{};if(msg.type==='skillsHubInit'&&Array.isArray(msg.skills)){skills=mergeSkills(msg.skills);render();document.getElementById('loading').classList.add('hidden')}});
(function(){renderChips();render();window.parent&&window.parent.postMessage({type:'skillsHubReady'},'*');setTimeout(()=>document.getElementById('loading').classList.add('hidden'),1800)})();
</script>
</body>
</html>
