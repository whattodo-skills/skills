<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Feelings Wheel | What To Do! with Terri Kern</title>
<style>
  :root {
    --bg: #F7F4ED;
    --navy: #12233E;
    --teal: #3d8b76;
    --teal-lt: #B4DACD;
    --teal-bg: #eaf4f0;
    --pink: #BD3A59;
    --pink-lt: #f7e0e6;
    --purple: #4F5DAD;
    --purple-lt: #e8eaf8;
    --text: #1e1e1e;
    --muted: #6b7280;
    --border: #e0ddd6;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .site-header {
    background: linear-gradient(135deg, #12233E 0%, #1e3a6e 60%, #2a4a8a 100%);
    color: #fff;
    padding: 28px 24px 32px;
    text-align: center;
  }
  .eyebrow {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--teal-lt);
    margin-bottom: 8px;
    opacity: 0.9;
  }
  .site-header h1 {
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
  }
  .subtitle {
    font-size: 15px;
    color: rgba(255,255,255,0.75);
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.5;
  }

  /* MAIN LAYOUT */
  .main {
    max-width: 800px;
    margin: 0 auto;
    padding: 32px 16px 48px;
  }

  /* WHEEL CONTAINER */
  .wheel-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
  }
  .wheel-wrap svg {
    max-width: 480px;
    width: 100%;
    height: auto;
    display: block;
    cursor: pointer;
  }

  .segment {
    transition: filter 0.15s ease;
    cursor: pointer;
  }
  .segment:hover,
  .segment.active {
    filter: brightness(1.2);
  }

  .seg-label {
    pointer-events: none;
    user-select: none;
  }

  /* INFO PANEL */
  .info-panel {
    max-width: 640px;
    margin: 0 auto 28px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 16px rgba(18,35,62,0.10);
    border: 1px solid var(--border);
    overflow: hidden;
    min-height: 120px;
  }

  .info-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 120px;
    color: var(--muted);
    font-size: 15px;
    gap: 8px;
    padding: 32px;
    text-align: center;
  }

  .info-content { display: none; }
  .info-content.visible { display: block; }

  .info-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .info-num-circle {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: #fff;
    flex-shrink: 0;
  }
  .info-emoji { font-size: 26px; line-height: 1; }
  .info-name {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.01em;
    flex: 1;
  }
  .cat-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .cat-badge.pleasant  { background: var(--teal-bg); color: var(--teal); }
  .cat-badge.mixed     { background: var(--purple-lt); color: var(--purple); }
  .cat-badge.difficult { background: var(--pink-lt); color: var(--pink); }

  .info-sections { padding: 0 0 8px; }

  .info-section {
    display: flex;
    gap: 0;
    border-bottom: 1px solid #f0ede7;
  }
  .info-section:last-child { border-bottom: none; }

  .section-bar {
    width: 4px;
    flex-shrink: 0;
  }
  .section-bar.pleasant  { background: var(--teal); }
  .section-bar.mixed     { background: var(--purple); }
  .section-bar.difficult { background: var(--pink); }

  .section-inner {
    padding: 12px 18px 13px;
    flex: 1;
  }
  .section-title {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .section-body {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
  }

  /* LEGEND */
  .legend-card {
    max-width: 640px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 16px rgba(18,35,62,0.10);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .legend-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--navy);
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--border);
    background: #faf9f6;
  }
  .legend-cols {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
  }
  .legend-col { padding: 12px 14px 16px; }
  .legend-col:not(:last-child) { border-right: 1px solid var(--border); }

  .legend-col-header {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    padding: 3px 10px 4px;
    border-radius: 20px;
    margin-bottom: 10px;
    display: inline-block;
  }
  .legend-col-header.pleasant  { background: var(--teal-bg); color: var(--teal); }
  .legend-col-header.mixed     { background: var(--purple-lt); color: var(--purple); }
  .legend-col-header.difficult { background: var(--pink-lt); color: var(--pink); }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 4px 6px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
    margin-bottom: 2px;
  }
  .legend-item:hover  { background: #f0ede7; }
  .legend-item.active { background: #f0ede7; box-shadow: inset 0 0 0 1.5px #d0cdc6; }

  .leg-num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }
  .leg-emoji { font-size: 14px; line-height: 1; }
  .leg-name {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.2;
  }

  @media (max-width: 520px) {
    .legend-cols { grid-template-columns: 1fr; }
    .legend-col:not(:last-child) { border-right: none; border-bottom: 1px solid var(--border); }
    .info-header { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header class="site-header">
  <p class="eyebrow">What To Do! with Terri Kern</p>
  <h1>The Feelings Wheel</h1>
  <p class="subtitle">Move over the wheel to explore any feeling in depth below</p>
</header>

<main class="main">

  <!-- WHEEL -->
  <div class="wheel-wrap">
    <svg id="wheel" viewBox="-220 -220 440 440" xmlns="http://www.w3.org/2000/svg"
         aria-label="Feelings wheel with 25 numbered segments">
      <!-- segments and labels injected by JS -->
      <!-- center circle -->
      <circle id="centerCircle" cx="0" cy="0" r="74" fill="#fff" />
      <text x="0" y="-7" text-anchor="middle" dominant-baseline="central"
            font-size="11" fill="#9ca3af" font-family="'Segoe UI',system-ui,sans-serif" font-weight="500">How are you</text>
      <text x="0" y="9" text-anchor="middle" dominant-baseline="central"
            font-size="11" fill="#9ca3af" font-family="'Segoe UI',system-ui,sans-serif" font-weight="500">feeling?</text>
    </svg>
  </div>

  <!-- INFO PANEL -->
  <div class="info-panel" id="infoPanel">
    <div class="info-empty" id="infoEmpty">
      <span>&#128070;</span>
      <span>Hover over a segment or tap a feeling in the legend below to explore it in depth</span>
    </div>
    <div class="info-content" id="infoContent">
      <div class="info-header" id="infoHeader"></div>
      <div class="info-sections" id="infoSections"></div>
    </div>
  </div>

  <!-- LEGEND -->
  <div class="legend-card">
    <div class="legend-title">&#128203; Feelings Reference</div>
    <div class="legend-cols" id="legendCols"></div>
  </div>

</main>

    { name:"Overwhelmed", emoji:"🫠", cat:"difficult",
      what:"A flooded feeling when there are too many demands, emotions, or stimuli for your system to process at once. Overwhelm is a signal that you've exceeded your current capacity.",
      body:"Heavy head, tight chest, shallow breathing, difficulty thinking clearly, a frozen or frantically busy quality.",
      thoughts:"\"I can't do this.\" \"There's too much.\" \"I don't know where to start.\" Paralysis or avoidance are common responses.",
      uncomfortable:"Do just one small thing. Write everything down to get it out of your head. Breathe. Ask for help. You don't have to handle everything right now — just this one moment.",
      articulate:"\"I'm feeling overwhelmed and I don't know where to start.\" / \"There's too much on my plate right now.\" / \"I need some support or breathing room.\""
    },
    { name:"Numb", emoji:"🩶", cat:"difficult",
      what:"An absence or muting of feeling — often a protective response when emotions have become too intense. Numbness is not indifference; it's your system trying to protect you.",
      body:"Feeling disconnected from your own body, going through the motions, flat affect, a foggy or distant quality, low responsiveness.",
      thoughts:"\"I don't feel anything.\" \"What's the point?\" \"I'm just going through the motions.\" Numbing often signals emotional overload just beneath the surface.",
      uncomfortable:"Try gentle sensory input to reconnect: cold water on your face, movement, strong smells, music. Ask softly: what might I be protecting myself from feeling?",
      articulate:"\"I've been feeling numb lately.\" / \"I'm disconnected from myself and I'm not sure why.\" / \"Something feels off — I'm not really here.\""
    },
    { name:"Depleted", emoji:"🪫", cat:"difficult",
      what:"A profound emptiness and exhaustion — physical, emotional, or both. Depletion goes beyond tired; it's the feeling that you've given everything and there is simply nothing left.",
      body:"Heavy limbs, a hollow or flat quality throughout the body, low or no energy, difficulty starting or finishing anything, eyes that feel dull, an absence of hunger or desire.",
      thoughts:"\"I have nothing left.\" \"I can't keep going like this.\" \"I'm running on empty.\" The mind is quiet but not in a peaceful way — more like a machine that's run out of fuel.",
      uncomfortable:"Rest is not optional right now — it is necessary. Try to remove one thing from your plate rather than adding anything. Even 10 minutes of genuine stillness begins to restore.",
      articulate:"\"I'm completely depleted right now.\" / \"I don't have anything left to give.\" / \"I need to rest and recover before I can show up for anything else.\""
    },
    { name:"Hurt", emoji:"💔", cat:"difficult",
      what:"An emotional pain caused by another person's words, actions, or absence. Hurt signals that something important to you — connection, respect, care — was affected.",
      body:"Tightness in the throat, heaviness in the chest, a tearful or fragile quality, a physical ache that's hard to localize.",
      thoughts:"\"They don't care about me.\" \"That wasn't okay.\" \"I didn't matter.\" Hurt often brings a desire to be acknowledged or to withdraw.",
      uncomfortable:"Try to feel the hurt rather than moving straight to anger (which is easier but covers it). Being hurt by someone is worth naming — to yourself and to them.",
      articulate:"\"I felt hurt when...\" / \"What happened made me feel like I didn't matter.\" / \"Something you said/did really affected me and I want you to know.\""
    }
  ];

  // ── COLORS ────────────────────────────────────────────────────────────────
  var COLORS = [
    '#4da896','#3a9888','#2a887a','#1a786c',  // pleasant 1-4
    '#2a8870','#3a9878','#4aa880','#5ab888',  // pleasant 5-8
    '#7078c4','#6068b4','#5058a4','#404894',  // mixed 9-12
    '#303884','#404090',                       // mixed 13-14
    '#d05870','#c04860','#b03850','#a02840',  // difficult 15-18
    '#bd3a59','#a82a49','#932039','#7e1029',  // difficult 19-22
    '#8e1a39','#9e2040','#ae2846'             // difficult 23-25
  ];

  // ── GEOMETRY ──────────────────────────────────────────────────────────────
  var OUTER_R = 200;
  var INNER_R = 78;
  var LABEL_R = (OUTER_R + INNER_R) / 2; // 139
  var TOTAL   = 25;
  var SWEEP   = 360 / TOTAL; // 14.4°
  var START_DEG = -90;

  function toRad(deg) { return deg * Math.PI / 180; }

  function polarXY(deg, r) {
    var rad = toRad(deg);
    return [r * Math.cos(rad), r * Math.sin(rad)];
  }

  function segPath(s, e, or, ir) {
    var p1 = polarXY(s, or), p2 = polarXY(e, or);
    var p3 = polarXY(e, ir), p4 = polarXY(s, ir);
    var la = (e - s) > 180 ? 1 : 0;
    return 'M ' + p1[0].toFixed(3) + ' ' + p1[1].toFixed(3)
      + ' A ' + or + ' ' + or + ' 0 ' + la + ' 1 ' + p2[0].toFixed(3) + ' ' + p2[1].toFixed(3)
      + ' L ' + p3[0].toFixed(3) + ' ' + p3[1].toFixed(3)
      + ' A ' + ir + ' ' + ir + ' 0 ' + la + ' 0 ' + p4[0].toFixed(3) + ' ' + p4[1].toFixed(3)
      + ' Z';
  }

  // ── BUILD SVG ─────────────────────────────────────────────────────────────
  var svgEl  = document.getElementById('wheel');
  var anchor = document.getElementById('centerCircle');
  var SVG_NS = 'http://www.w3.org/2000/svg';

  for (var i = 0; i < TOTAL; i++) {
    var s = START_DEG + i * SWEEP;
    var e = s + SWEEP;
    var mid = s + SWEEP / 2;
    var col = COLORS[i];

    // segment path
    var path = document.createElementNS(SVG_NS, 'path');
    path.setAttribute('d', segPath(s, e, OUTER_R, INNER_R));
    path.setAttribute('fill', col);
    path.setAttribute('stroke', '#fff');
    path.setAttribute('stroke-width', '2');
    path.setAttribute('class', 'segment');
    path.setAttribute('data-index', String(i));
    svgEl.insertBefore(path, anchor);

    // number label
    var lp = polarXY(mid, LABEL_R);
    var txt = document.createElementNS(SVG_NS, 'text');
    txt.setAttribute('x', lp[0].toFixed(3));
    txt.setAttribute('y', lp[1].toFixed(3));
    txt.setAttribute('text-anchor', 'middle');
    txt.setAttribute('dominant-baseline', 'central');
    txt.setAttribute('font-size', '11');
    txt.setAttribute('font-weight', '700');
    txt.setAttribute('fill', '#fff');
    txt.setAttribute('font-family', "'Segoe UI',system-ui,sans-serif");
    txt.setAttribute('class', 'seg-label');
    txt.setAttribute('data-index', String(i));
    txt.textContent = String(i + 1);
    svgEl.insertBefore(txt, anchor);
  }

  // ── INFO PANEL ────────────────────────────────────────────────────────────
  var activeIndex = null;
  var infoEmpty    = document.getElementById('infoEmpty');
  var infoContent  = document.getElementById('infoContent');
  var infoHeader   = document.getElementById('infoHeader');
  var infoSections = document.getElementById('infoSections');

  var sectionDefs = [
    { key:'what',          icon:'💭', label:'What this feeling is' },
    { key:'body',          icon:'🫀', label:'How it feels in your body' },
    { key:'thoughts',      icon:'🧠', label:'Thoughts it brings' },
    { key:'uncomfortable', icon:'🌿', label:'If it feels uncomfortable' },
    { key:'articulate',    icon:'🗣️', label:'How to put it into words' }
  ];

  function esc(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function showFeeling(idx) {
    recordSkillComplete('select-feeling');
    if (idx === activeIndex) return;
    activeIndex = idx;

    // update segment highlights
    var segs = svgEl.querySelectorAll('.segment');
    for (var k = 0; k < segs.length; k++) {
      if (parseInt(segs[k].getAttribute('data-index')) === idx) {
        segs[k].classList.add('active');
      } else {
        segs[k].classList.remove('active');
      }
    }

    // update legend highlights
    var items = document.querySelectorAll('.legend-item');
    for (var j = 0; j < items.length; j++) {
      if (parseInt(items[j].getAttribute('data-index')) === idx) {
        items[j].classList.add('active');
      } else {
        items[j].classList.remove('active');
      }
    }

    var f   = feelings[idx];
    window.parent.postMessage({ type: 'feelingSelected', feeling: f.name }, '*');
    var col = COLORS[idx];
    var num = idx + 1;
    var capCat = f.cat.charAt(0).toUpperCase() + f.cat.slice(1);

    infoHeader.innerHTML =
      '<div class="info-num-circle" style="background:' + col + '">' + num + '</div>' +
      '<div class="info-emoji">' + f.emoji + '</div>' +
      '<div class="info-name">' + esc(f.name) + '</div>' +
      '<span class="cat-badge ' + f.cat + '">' + capCat + '</span>';

    var secHTML = '';
    for (var s = 0; s < sectionDefs.length; s++) {
      var sd = sectionDefs[s];
      secHTML +=
        '<div class="info-section">' +
          '<div class="section-bar ' + f.cat + '"></div>' +
          '<div class="section-inner">' +
            '<div class="section-title">' + sd.icon + ' ' + esc(sd.label) + '</div>' +
            '<div class="section-body">' + esc(f[sd.key]) + '</div>' +
          '</div>' +
        '</div>';
    }
    infoSections.innerHTML = secHTML;

    infoEmpty.style.display = 'none';
    infoContent.classList.add('visible');
  }

  // wheel hover / touch
  svgEl.addEventListener('mousemove', function (e) {
    var el = e.target;
    while (el && el !== svgEl) {
      var di = el.getAttribute('data-index');
      if (di !== null) { showFeeling(parseInt(di)); return; }
      el = el.parentNode;
    }
  });

  svgEl.addEventListener('touchstart', function (e) {
    var t = e.touches[0];
    var el = document.elementFromPoint(t.clientX, t.clientY);
    while (el && el !== svgEl) {
      var di = el.getAttribute('data-index');
      if (di !== null) { e.preventDefault(); showFeeling(parseInt(di)); return; }
      el = el.parentNode;
    }
  }, { passive: false });

  // ── BUILD LEGEND ──────────────────────────────────────────────────────────
  var legendCols = document.getElementById('legendCols');

  var groups = [
    { cat:'pleasant',  label:'Pleasant',  start:0,  end:8  },
    { cat:'mixed',     label:'Mixed',     start:8,  end:14 },
    { cat:'difficult', label:'Difficult', start:14, end:25 }
  ];

  groups.forEach(function (g) {
    var col = document.createElement('div');
    col.className = 'legend-col';

    var hdr = document.createElement('div');
    hdr.className = 'legend-col-header ' + g.cat;
    hdr.textContent = g.label;
    col.appendChild(hdr);

    for (var i = g.start; i < g.end; i++) {
      var f = feelings[i];
      var item = document.createElement('div');
      item.className = 'legend-item';
      item.setAttribute('data-index', String(i));
      item.innerHTML =
        '<div class="leg-num" style="background:' + COLORS[i] + '">' + (i + 1) + '</div>' +
        '<span class="leg-emoji">' + f.emoji + '</span>' +
        '<span class="leg-name">' + esc(f.name) + '</span>';

      (function (idx) {
        item.addEventListener('click', function () { showFeeling(idx); });
        item.addEventListener('touchstart', function (e) {
          e.preventDefault();
          showFeeling(idx);
        }, { passive: false });
      })(i);

      col.appendChild(item);
    }

    legendCols.appendChild(col);
  });

})();
</script>
</body>
</html>
